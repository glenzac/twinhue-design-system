<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hue-design-system — light/dark side-by-side reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lato:wght@300;400;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/hue.css">
<style>
  /* page chrome sits between the two themes */
  body { background: #8a8378; }
  .ref-header { color: #f1ede5; max-width: 1800px; margin: 0 auto; padding: 20px 24px 4px; }
  .ref-header h1 { color: #f1ede5; }
  .ref-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    max-width: 1800px; margin: 0 auto; padding: 16px 24px 48px;
  }
  @media (max-width: 900px) { .ref-grid { grid-template-columns: 1fr; } }
  .ref-panel {
    background: var(--hue-bg); color: var(--hue-text);
    border-radius: 12px; padding: 20px 22px; min-width: 0;
  }
  .ref-panel-title {
    font-family: var(--hue-font-display); font-weight: 700; font-size: 1.1rem;
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 2px solid var(--hue-border); padding-bottom: 8px; margin-bottom: 16px;
  }
  .ref-panel-title small { color: var(--hue-text-2); font-family: var(--hue-font-mono); font-weight: 400; }
  .swatch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap: 8px; }
  .swatch { border: 1px solid var(--hue-border); border-radius: 8px; overflow: hidden; }
  .swatch .chip { height: 34px; }
  .swatch .meta { padding: 4px 7px; font-size: 10px; line-height: 1.5; background: var(--hue-surface); }
  .swatch .meta .name { font-weight: 700; display: block; color: var(--hue-text); }
  .swatch .meta .hex { font-family: var(--hue-font-mono); color: var(--hue-text-2); text-transform: uppercase; }
  section { margin-bottom: 26px; }
</style>
</head>
<body>

<div class="ref-header">
  <h1 class="h3 mb-1">hue-design-system reference — MorningHue vs EveningHue</h1>
  <p class="mb-0" style="opacity:.85">Identical stock-Bootstrap markup rendered in both themes. Compare row by row; anything that looks wrong here will look wrong in the apps.</p>
</div>

<div class="ref-grid">
  <div class="ref-panel" data-bs-theme="light" id="panel-light"></div>
  <div class="ref-panel" data-bs-theme="dark" id="panel-dark"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
"use strict";

var TOKENS = [
  "--hue-bg","--hue-surface","--hue-hover","--hue-widget","--hue-border",
  "--hue-text","--hue-text-2","--hue-text-3","--hue-on-accent",
  "--hue-primary","--hue-primary-emphasis","--hue-primary-subtle","--hue-link",
  "--hue-success","--hue-warning","--hue-danger","--hue-info",
  "--hue-chart-1","--hue-chart-2","--hue-chart-3","--hue-chart-4",
  "--hue-chart-5","--hue-chart-6","--hue-chart-7","--hue-chart-8"
];

function panelHTML(p, title) {
  return `
  <div class="ref-panel-title"><span>${title}</span><small>data-bs-theme="${p}"</small></div>

  <section>
    <p class="hue-label">Tokens</p>
    <div class="swatch-grid" id="${p}-swatches"></div>
  </section>

  <section>
    <p class="hue-label">Typography</p>
    <h2 class="mb-1">Heading — Inter 600</h2>
    <p class="mb-1">Body text in Lato. <a href="#">A link</a>, <strong>bold</strong>, <span class="text-secondary">secondary text</span>, <code>inline code</code>.</p>
    <p class="mb-0" style="font-family:var(--hue-font-mono);font-size:.8125rem">Source Code Pro 1234567890 — tables &amp; code</p>
  </section>

  <section>
    <p class="hue-label">Buttons</p>
    <div class="d-flex flex-wrap gap-2 mb-2">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-success">Success</button>
      <button class="btn btn-danger">Danger</button>
      <button class="btn btn-warning">Warning</button>
      <button class="btn btn-info">Info</button>
    </div>
    <div class="d-flex flex-wrap gap-2">
      <button class="btn btn-outline-primary">Outline</button>
      <button class="btn btn-outline-secondary">Outline 2</button>
      <button class="btn btn-outline-danger">Outline danger</button>
      <button class="btn btn-link">Link</button>
      <button class="btn btn-primary" disabled>Disabled</button>
    </div>
  </section>

  <section>
    <p class="hue-label">Badges, status &amp; amounts</p>
    <div class="d-flex flex-wrap gap-2 mb-2">
      <span class="badge text-bg-primary">Primary</span>
      <span class="badge text-bg-success">Success</span>
      <span class="badge text-bg-danger">Danger</span>
      <span class="badge text-bg-warning">Warning</span>
      <span class="badge badge-soft-primary">Soft primary</span>
      <span class="badge badge-soft-success">Reconciled</span>
      <span class="badge badge-soft-warning">Pending</span>
      <span class="badge badge-soft-danger">Failed</span>
      <span class="badge badge-soft-neutral">Skipped</span>
    </div>
    <div class="d-flex flex-wrap gap-4 align-items-center">
      <span class="hue-status hue-status-ok">Connected</span>
      <span class="hue-status hue-status-warn">Degraded</span>
      <span class="hue-status hue-status-error">Offline</span>
      <span class="hue-amount-pos">+1,20,000.00</span>
      <span class="hue-amount-neg">−2,199.00</span>
    </div>
  </section>

  <section>
    <p class="hue-label">Alerts</p>
    <div class="alert alert-success py-2 mb-2">Import complete — 214 transactions.</div>
    <div class="alert alert-warning py-2 mb-2">3 holdings missing purchase price.</div>
    <div class="alert alert-danger py-2 mb-2">NAV fetch failed — API timeout.</div>
    <div class="alert alert-info py-2 mb-0">Restore point created.</div>
  </section>

  <section>
    <p class="hue-label">Card + KPI stats</p>
    <div class="row g-2">
      <div class="col-6"><div class="card p-3 hue-stat">
        <span class="hue-stat-num">₹4.2L</span><span class="hue-stat-label">Net worth</span>
      </div></div>
      <div class="col-6"><div class="card p-3 hue-stat">
        <span class="hue-stat-num text-success">+12.4%</span><span class="hue-stat-label">XIRR (1Y)</span>
      </div></div>
    </div>
  </section>

  <section>
    <p class="hue-label">Forms</p>
    <div class="card p-3">
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label">Account</label>
          <select class="form-select form-select-sm"><option>SBI SimplyCLICK</option></select>
        </div>
        <div class="col-6">
          <label class="form-label">Amount</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text">₹</span>
            <input type="number" class="form-control" placeholder="0.00">
          </div>
        </div>
      </div>
      <div class="d-flex gap-4 mt-3 align-items-center">
        <div class="form-check mb-0"><input class="form-check-input" type="checkbox" checked id="${p}-c"><label class="form-check-label" for="${p}-c">Reconciled</label></div>
        <div class="form-check form-switch mb-0"><input class="form-check-input" type="checkbox" checked id="${p}-s"><label class="form-check-label" for="${p}-s">Auto-categorize</label></div>
        <input type="range" class="form-range w-25" value="60">
      </div>
    </div>
  </section>

  <section>
    <p class="hue-label">Table</p>
    <table class="table table-striped table-hover align-middle mb-0">
      <thead><tr><th>Date</th><th>Description</th><th class="text-end">Amount</th><th>Status</th></tr></thead>
      <tbody>
        <tr><td>Jul 12</td><td>Swiggy</td><td class="text-end hue-amount-neg">−482.00</td><td><span class="badge badge-soft-success">Done</span></td></tr>
        <tr><td>Jul 11</td><td>Salary</td><td class="text-end hue-amount-pos">+1,20,000.00</td><td><span class="badge badge-soft-success">Done</span></td></tr>
        <tr><td>Jul 10</td><td>Amazon</td><td class="text-end hue-amount-neg">−2,199.00</td><td><span class="badge badge-soft-warning">Pending</span></td></tr>
      </tbody>
    </table>
  </section>

  <section>
    <p class="hue-label">Navigation</p>
    <ul class="nav nav-tabs mb-2">
      <li class="nav-item"><a class="nav-link active" href="#">Overview</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Holdings</a></li>
    </ul>
    <div class="d-flex gap-3 align-items-center mb-2">
      <ul class="nav nav-pills mb-0">
        <li class="nav-item"><a class="nav-link active" href="#">1M</a></li>
        <li class="nav-item"><a class="nav-link" href="#">1Y</a></li>
      </ul>
      <ul class="pagination pagination-sm mb-0">
        <li class="page-item active"><span class="page-link">1</span></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">›</a></li>
      </ul>
    </div>
    <div class="progress mb-0" style="height:8px"><div class="progress-bar" style="width:64%"></div></div>
  </section>

  <section>
    <p class="hue-label">Accordion</p>
    <div class="accordion" id="${p}-acc">
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#${p}-a1">Open section (active state)</button>
        </h2>
        <div id="${p}-a1" class="accordion-collapse collapse show" data-bs-parent="#${p}-acc">
          <div class="accordion-body">Expanded accordion body content.</div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#${p}-a2">Collapsed section</button>
        </h2>
        <div id="${p}-a2" class="accordion-collapse collapse" data-bs-parent="#${p}-acc">
          <div class="accordion-body">Second body.</div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <p class="hue-label">Dropdown (static) + modal (static)</p>
    <div class="row g-2">
      <div class="col-5">
        <div class="dropdown-menu show position-static d-block">
          <a class="dropdown-item active" href="#">Edit</a>
          <a class="dropdown-item" href="#">Duplicate</a>
          <hr class="dropdown-divider">
          <a class="dropdown-item text-danger" href="#">Delete</a>
        </div>
      </div>
      <div class="col-7">
        <div class="modal position-static d-block" tabindex="-1">
          <div class="modal-dialog modal-sm m-0"><div class="modal-content">
            <div class="modal-header py-2"><h6 class="modal-title mb-0">Confirm</h6><button type="button" class="btn-close"></button></div>
            <div class="modal-body py-2">Import 214 transactions?</div>
            <div class="modal-footer py-1">
              <button class="btn btn-sm btn-secondary">Cancel</button>
              <button class="btn btn-sm btn-primary">Import</button>
            </div>
          </div></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <p class="hue-label">Charts (Chart.js, --hue-chart-1…8)</p>
    <div class="card p-3 mb-2"><canvas id="${p}-bar" height="130"></canvas></div>
    <div class="row g-2">
      <div class="col-7"><div class="card p-3"><canvas id="${p}-line" height="150"></canvas></div></div>
      <div class="col-5"><div class="card p-3"><canvas id="${p}-donut" height="150"></canvas></div></div>
    </div>
  </section>

  <section class="mb-0">
    <p class="hue-label">Log panel</p>
    <div class="hue-log mb-0"><span class="hue-log-dim">12:34:01</span>  <span class="hue-log-info">Parsing statement…</span>
<span class="hue-log-dim">12:34:02</span>  <span class="hue-log-success">214 rows imported</span>
<span class="hue-log-dim">12:34:03</span>  <span class="hue-log-warn">2 duplicates skipped</span>
<span class="hue-log-dim">12:34:04</span>  <span class="hue-log-error">1 row failed</span></div>
  </section>`;
}

function build(p, title) {
  var panel = document.getElementById("panel-" + p);
  panel.innerHTML = panelHTML(p, title);

  // token swatches with resolved hex, read from THIS panel's computed style
  var cs = getComputedStyle(panel);
  var grid = document.getElementById(p + "-swatches");
  TOKENS.forEach(function (t) {
    var v = cs.getPropertyValue(t).trim();
    var d = document.createElement("div");
    d.className = "swatch";
    d.innerHTML = '<div class="chip" style="background:' + v + '"></div>' +
      '<div class="meta"><span class="name">' + t.replace("--hue-", "") + '</span>' +
      '<span class="hex">' + v + "</span></div>";
    grid.appendChild(d);
  });

  // charts using this panel's palette
  var colors = [];
  for (var i = 1; i <= 8; i++) colors.push(cs.getPropertyValue("--hue-chart-" + i).trim());
  var grid_c = cs.getPropertyValue("--hue-chart-grid").trim();
  var text_c = cs.getPropertyValue("--hue-text-2").trim();
  var common = {
    responsive: true,
    plugins: { legend: { labels: { color: text_c, font: { family: "Lato" } } } },
    scales: {
      x: { grid: { color: grid_c }, ticks: { color: text_c, font: { family: "Lato" } } },
      y: { grid: { color: grid_c }, ticks: { color: text_c, font: { family: "Lato" } } }
    }
  };
  var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun"];

  new Chart(document.getElementById(p + "-bar"), {
    type: "bar",
    data: { labels: months, datasets: [
      { label: "Income", data: [120, 118, 125, 122, 130, 128], backgroundColor: colors[1] },
      { label: "Expenses", data: [84, 91, 78, 96, 88, 93], backgroundColor: colors[5] },
      { label: "Invested", data: [25, 25, 30, 25, 35, 30], backgroundColor: colors[0] }
    ]},
    options: common
  });

  new Chart(document.getElementById(p + "-line"), {
    type: "line",
    data: { labels: months, datasets: [
      { label: "Portfolio", data: [380, 392, 371, 405, 412, 420], borderColor: colors[0], backgroundColor: colors[0], tension: 0.3 },
      { label: "Benchmark", data: [380, 385, 379, 391, 399, 404], borderColor: colors[2], backgroundColor: colors[2], borderDash: [5, 4], tension: 0.3 }
    ]},
    options: common
  });

  new Chart(document.getElementById(p + "-donut"), {
    type: "doughnut",
    data: { labels: ["Equity", "Debt", "Gold", "Cash"], datasets: [
      { data: [55, 25, 10, 10], backgroundColor: colors.slice(0, 4), borderColor: cs.getPropertyValue("--hue-surface").trim() }
    ]},
    options: { responsive: true, plugins: { legend: { position: "right", labels: { color: text_c, font: { family: "Lato" } } } } }
  });
}

build("light", "MorningHue — light");
build("dark", "EveningHue — dark");
</script>
</body>
</html>
